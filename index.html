<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I Love You Project ❤️</title>

<!-- CSS goes in next step -->
<style>
/* =========================
   GLOBAL RESET
========================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background: radial-gradient(circle at center, #0a0a0a 0%, #000 70%);
    overflow:hidden;
    font-family: Arial, Helvetica, sans-serif;
    height:100vh;
    width:100vw;
}

/* =========================
   CANVAS LAYERS
========================= */

#particleCanvas{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:1;
}

#heartCanvas{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:2;
}

/* =========================
   MAIN CONTAINER
========================= */

.container{
    position:relative;
    z-index:5;
    width:100%;
    height:100vh;
}

/* =========================
   SCREENS SYSTEM
========================= */

.screen{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    text-align:center;

    transition: all 0.8s ease;
}

.hidden{
    opacity:0;
    pointer-events:none;
    transform: scale(1.05);
}

/* =========================
   TITLE
========================= */

.title{
    font-size:3.5rem;
    color:white;

    text-shadow:
        0 0 10px #9864b1,
        0 0 20px #9864b1,
        0 0 40px #9864b1;

    margin-bottom:15px;
}

/* =========================
   SUBTITLE
========================= */

.subtitle{
    color:#bbb;
    font-size:1.2rem;
    margin-bottom:40px;
}

/* =========================
   BUTTONS
========================= */

.btn{
    margin:10px;
    padding:16px 38px;

    font-size:1.1rem;
    font-weight:bold;

    color:white;

    background: linear-gradient(135deg, #9864b1, #9864b1);

    border:none;
    border-radius:50px;

    cursor:pointer;

    box-shadow:
        0 0 10px #9864b1,
        0 0 25px #9864b1;

    transition: 0.3s ease;
}

.btn:hover{
    transform: scale(1.08);
    box-shadow:
        0 0 20px #ff2d75,
        0 0 50px #ff2d75;
}

.btn:active{
    transform: scale(0.95);
}

/* =========================
   LOVE TEXT
========================= */

#loveText{
    font-size:3rem;
    color:white;

    text-shadow:
        0 0 10px #9864b1,
        0 0 20px #9864b1,
        0 0 40px #9864b1;

    transition: opacity 0.4s ease, transform 0.4s ease;
}

/* =========================
   FINAL MESSAGE
========================= */

.finalMessage{
    font-size:2rem;
    color:white;

    width:80%;
    line-height:1.6;

    text-shadow:
        0 0 10px #9864b1,
        0 0 30px #9864b1;
}

/* =========================
   HEART MESSAGE
========================= */

#finalLoveMessage{
    position:absolute;
    bottom:15%;
    width:100%;
    text-align:center;

    font-size:3rem;
    color:white;

    opacity:0;

    text-shadow:
        0 0 10px #9864b1,
        0 0 30px #9864b1,
        0 0 60px #9864b1;

    transition: opacity 1.5s ease;
}

/* =========================
   MOBILE
========================= */

@media (max-width:768px){

    .title{
        font-size:2.2rem;
    }

    #loveText{
        font-size:2rem;
        padding:0 20px;
    }

    .finalMessage{
        font-size:1.3rem;
    }

    .btn{
        font-size:1rem;
        padding:14px 28px;
    }

    #finalLoveMessage{
        font-size:2rem;
    }
}
</style>

</head>

<body>

<!-- =========================
     BACKGROUND PARTICLES
========================= -->
<canvas id="particleCanvas"></canvas>

<!-- =========================
     MAIN APP WRAPPER
========================= -->
<div class="container">

    <!-- =========================
         SCREEN 1 (CHOICE SCREEN)
    ========================== -->
    <div id="introScreen" class="screen">

        <h1 class="title">❤️ A Small Surprise ❤️</h1>

        <p class="subtitle">Choose what you want to see</p>

        <button id="startBtn" class="btn">
            🌍 100 Languages
        </button>

        <button id="heartBtn" class="btn">
            💖 Neon Heart
        </button>

    </div>

    <!-- =========================
         SCREEN 2 (LANGUAGES)
    ========================== -->
    <div id="languageScreen" class="screen hidden">

        <div id="loveText">I love you</div>

    </div>

    <!-- =========================
         SCREEN 3 (FINAL TEXT)
    ========================== -->
    <div id="finalScreen" class="screen hidden">

        <h2 class="finalMessage">
            No matter the language,<br>
            it always means the same thing ❤️
        </h2>

        <button id="toHeartBtn" class="btn">
            Continue ✨
        </button>

    </div>

    <!-- =========================
         SCREEN 4 (HEART SCENE)
    ========================== -->
    <div id="heartScreen" class="screen hidden">

        <!-- Heart canvas -->
        <canvas id="heartCanvas"></canvas>

        <!-- Final message -->
        <div id="finalLoveMessage">
            ❤️ I Love You ❤️
        </div>

    </div>

</div>

<!-- =========================
     SCRIPTS (NEXT STEP)
========================= -->
<script>
// ==========================
// ELEMENTS
// ==========================

const introScreen = document.getElementById("introScreen");
const languageScreen = document.getElementById("languageScreen");
const finalScreen = document.getElementById("finalScreen");
const heartScreen = document.getElementById("heartScreen");

const startBtn = document.getElementById("startBtn");
const heartBtn = document.getElementById("heartBtn");
const toHeartBtn = document.getElementById("toHeartBtn");

const loveText = document.getElementById("loveText");
const finalLoveMessage = document.getElementById("finalLoveMessage");

// ==========================
// CANVAS SETUP
// ==========================

const canvas = document.getElementById("particleCanvas");
const ctx = canvas.getContext("2d");

const hcanvas = document.getElementById("heartCanvas");
const hctx = hcanvas.getContext("2d");

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    hcanvas.width = window.innerWidth;
    hcanvas.height = window.innerHeight;
}
resize();

window.addEventListener("resize", resize);

// ==========================
// BACKGROUND PARTICLES (ALWAYS)
// ==========================

let particles = [];

function initParticles(){
    particles = [];

    for(let i = 0; i < 220; i++){
        particles.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            vx: (Math.random() - 0.5) * 0.4,
            vy: (Math.random() - 0.5) * 0.4
        });
    }
}

initParticles();

function animateBackground(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    for(let p of particles){

        p.x += p.vx;
        p.y += p.vy;

        if(p.x < 0) p.x = canvas.width;
        if(p.x > canvas.width) p.x = 0;
        if(p.y < 0) p.y = canvas.height;
        if(p.y > canvas.height) p.y = 0;

        ctx.beginPath();
        ctx.arc(p.x,p.y,2,0,Math.PI*2);

        ctx.fillStyle = "#9864b1";
        ctx.shadowBlur = 15;
        ctx.shadowColor = "#9864b1";
        ctx.fill();
    }

    requestAnimationFrame(animateBackground);
}
animateBackground();

// ==========================
// LOVE LANGUAGES
// ==========================

const loveLanguages = [
"I love you","Te amo","Je t'aime","Ich liebe dich","Ti amo",
"Eu te amo","Ik hou van jou","Jag älskar dig","Jeg elsker dig",
"Minä rakastan sinua","Kocham cię","Miluji tě","Szeretlek",
"Te iubesc","Volim te","Σ' αγαπώ","Seni seviyorum","أنا أحبك",
"אני אוהב אותך","دوستت دارم","我爱你","사랑해","愛してる"
];

// ==========================
// LANGUAGE FLOW
// ==========================

startBtn.addEventListener("click", () => {

    introScreen.classList.add("hidden");
    languageScreen.classList.remove("hidden");

    let i = 0;

    const interval = setInterval(() => {

        loveText.style.opacity = 0;
        loveText.style.transform = "translateY(20px)";

        setTimeout(() => {
            loveText.textContent = loveLanguages[i];
            loveText.style.opacity = 1;
            loveText.style.transform = "translateY(0)";
        }, 200);

        i++;

        if(i >= loveLanguages.length){
            clearInterval(interval);

            setTimeout(() => {
                languageScreen.classList.add("hidden");
                finalScreen.classList.remove("hidden");
            }, 800);
        }

    }, 700);

});

// ==========================
// HEART NAVIGATION
// ==========================

heartBtn.addEventListener("click", openHeart);
toHeartBtn.addEventListener("click", openHeart);

function openHeart(){

    introScreen.classList.add("hidden");
    languageScreen.classList.add("hidden");
    finalScreen.classList.add("hidden");

    heartScreen.classList.remove("hidden");

    prepareHeart();
    startHeart();
}

// ==========================
// HEART SYSTEM
// ==========================

let heartPoints = [];
let progress = 0;
let heartStarted = false;

function prepareHeart(){

    heartPoints = [];
    progress = 0;

    const total = particles.length;
    const scale = 18;

    for(let i = 0; i < total; i++){

        let t = (Math.PI * 2) * (i / total) - Math.PI / 2;

        let x = 16 * Math.pow(Math.sin(t), 3);
        let y = -(13 * Math.cos(t)
            - 5 * Math.cos(2*t)
            - 2 * Math.cos(3*t)
            - Math.cos(4*t));

        heartPoints.push({
            x: canvas.width/2 + x * scale,
            y: canvas.height/2 + y * scale
        });
    }
}

// ==========================
// HEART ANIMATION (CLEAN VERSION)
// ==========================

function startHeart(){

    if(heartStarted) return;
    heartStarted = true;

    animateHeart();

    setTimeout(() => {
        finalLoveMessage.style.opacity = 1;
    }, 4500);
}

function animateHeart(){

    hctx.clearRect(0,0,hcanvas.width,hcanvas.height);

    progress += 0.001; // smooth slow build

    for(let i = 0; i < particles.length; i++){

        let p = particles[i];
        let target = heartPoints[i];

        if(!target) continue;

        // gradual activation instead of broken index jump
        let activation = (i / particles.length);

        if(progress > activation){

            let dx = target.x - p.x;
            let dy = target.y - p.y;

            p.x += dx * 0.05;
            p.y += dy * 0.05;

            hctx.beginPath();
            hctx.arc(p.x,p.y,2.4,0,Math.PI*2);

            hctx.fillStyle = "#9864b1";
            hctx.shadowBlur = 25;
            hctx.shadowColor = "#9864b1";
            hctx.fill();
        }
    }

    requestAnimationFrame(animateHeart);
}
</script>

</body>
</html>
